name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cwe:
    name: CWE (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Bandit (+ SARIF)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Scan (medium+ → échec si CWE critique)
        run: |
          bandit -r app scripts -c bandit.yaml -f sarif -o bandit-cwe.sarif --exit-zero
          bandit -r app scripts -c bandit.yaml -ll -f json -o bandit-cwe.json
          python scripts/print_bandit_cwe_summary.py bandit-cwe.json

      - name: Upload SARIF (Code scanning)
        if: >-
          always() && (
            github.event_name != 'pull_request'
            || github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-cwe.sarif
          category: bandit

      - name: Upload rapport CWE
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-cwe-report
          path: |
            bandit-cwe.json
            bandit-cwe.sarif

  verify:
    name: Lint & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (syntaxe / erreurs critiques)
        run: ruff check app scripts tests

      - name: Byte-compile
        run: python -m compileall -q app scripts

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest -q --tb=short
