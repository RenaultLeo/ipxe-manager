[tool.ruff]
target-version = "py311"
line-length = 120
src = ["app", "scripts", "tests"]

[tool.ruff.lint]
# Erreurs syntaxe / noms non définis — sans imposer tout le style du dépôt d'un coup.
select = ["E9", "F63", "F7", "F82"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
