{# Fragment HTMX retourné par /isos/{id}/status — remplace le badge de statut #}
{% if status == 'ready' %}
<span class="badge bg-success"><i class="bi bi-check-circle me-1"></i>Prêt</span>
{% elif status == 'extracting' %}
<span class="badge bg-warning text-dark"
      hx-get="/isos/{{ version_id }}/status-fragment"
      hx-trigger="every 3s"
      hx-swap="outerHTML">
  <i class="bi bi-arrow-repeat spin me-1"></i>Extraction…
</span>
{% elif status == 'error' %}
<span class="badge bg-danger"><i class="bi bi-x-circle me-1"></i>Erreur</span>
{% else %}
<span class="badge bg-secondary"><i class="bi bi-upload me-1"></i>Uploadé</span>
{% endif %}
