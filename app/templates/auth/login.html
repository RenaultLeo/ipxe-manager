<!DOCTYPE html>
<html lang="{{ lang }}" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t('auth.subtitle') }} — iPXE Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-dark">
<div class="card shadow-lg" style="width:380px">
  <div class="card-body p-4">
    <div class="text-center mb-3">
      <i class="bi bi-hdd-network-fill text-primary" style="font-size:3rem"></i>
      <h4 class="mt-2 fw-bold">iPXE Manager</h4>
      <p class="text-muted small">{{ t('auth.subtitle') }}</p>
      <div class="dropdown d-inline-block">
        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                data-bs-toggle="dropdown">{{ lang|upper }}</button>
        <ul class="dropdown-menu dropdown-menu-end">
          {% for code in locale_choices %}
          <li><a class="dropdown-item {% if lang == code %}active{% endif %}"
                 href="/set-language?lang={{ code }}&amp;next={{ i18n_next }}">{{ t('lang.' ~ code) }}</a></li>
          {% endfor %}
        </ul>
      </div>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">{{ t('auth.username') }}</label>
        <input type="text" name="username" class="form-control form-control-lg" autofocus required
               autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label">{{ t('auth.password') }}</label>
        <input type="password" name="password" class="form-control form-control-lg" required
               autocomplete="current-password">
      </div>
      <button class="btn btn-primary w-100 btn-lg" type="submit">
        <i class="bi bi-unlock me-1"></i>{{ t('auth.submit') }}
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
