<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — iPXE Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-dark">
<div class="card shadow-lg" style="width:360px">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <i class="bi bi-hdd-network-fill text-primary" style="font-size:3rem"></i>
      <h4 class="mt-2 fw-bold">iPXE Manager</h4>
      <p class="text-muted small">Connexion administrateur</p>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control form-control-lg" autofocus required>
      </div>
      <button class="btn btn-primary w-100 btn-lg">
        <i class="bi bi-unlock me-1"></i>Se connecter
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
