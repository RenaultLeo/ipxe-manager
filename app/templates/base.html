<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}iPXE Manager{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-primary" href="/">
      <i class="bi bi-hdd-network-fill me-2"></i>iPXE Manager
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/isos' in request.url.path %}active{% endif %}" href="/isos">
            <i class="bi bi-disc me-1"></i>ISOs
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/boot-files' in request.url.path %}active{% endif %}" href="/boot-files">
            <i class="bi bi-files me-1"></i>Fichiers Boot
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ipxe-configs' in request.url.path %}active{% endif %}" href="/ipxe-configs">
            <i class="bi bi-file-code me-1"></i>Configs Auto
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ipxe-menus' in request.url.path %}active{% endif %}" href="/ipxe-menus">
            <i class="bi bi-list-ul me-1"></i>Menus iPXE
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/firmware' in request.url.path %}active{% endif %}" href="/firmware">
            <i class="bi bi-cpu me-1"></i>Firmware
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/settings' in request.url.path %}active{% endif %}" href="/settings">
            <i class="bi bi-gear me-1"></i>Paramètres
          </a>
        </li>
      </ul>
      <a href="/logout" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
      </a>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/shell/shell.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/yaml/yaml.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
