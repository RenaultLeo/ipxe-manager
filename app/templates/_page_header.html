{# title, subtitle (optional), icon (optional bi class), actions (optional HTML) #}
<div class="page-header d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
  <div class="page-header-text">
    <h1 class="page-title h3 mb-1">
      {% if icon %}<i class="bi {{ icon }} me-2 text-primary"></i>{% endif %}{{ title }}
    </h1>
    {% if subtitle %}
    <p class="page-subtitle text-muted small mb-0">{{ subtitle }}</p>
    {% endif %}
  </div>
  {% if actions %}
  <div class="page-header-actions d-flex flex-wrap align-items-center gap-2">
    {{ actions }}
  </div>
  {% endif %}
</div>
