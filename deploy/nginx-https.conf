# /etc/nginx/sites-available/ipxe-manager — HTTPS (auto-signé OpenSSL)
# Activé par : sudo bash deploy/enable-https.sh
# Revenir en HTTP : sudo bash deploy/disable-https.sh

# Redirection HTTP → HTTPS (clients iPXE doivent utiliser https:// dans SERVER_BASE_URL)
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /srv/ipxe/ssl/server.crt;
    ssl_certificate_key /srv/ipxe/ssl/server.key;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    # iPXE : TLS 1.2 + RSA/GCM uniquement (pas TLS 1.3 ni certificats EC serveur)
    ssl_protocols             TLSv1.2;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384:AES128-GCM-SHA256:AES256-GCM-SHA384:!aNULL:!MD5:!ECDSA;

    access_log  /var/log/nginx/ipxe-manager.access.log;
    error_log   /var/log/nginx/ipxe-manager.error.log;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;

    client_max_body_size 60G;

    location /menus/ {
        alias /srv/ipxe/http/menus/;
        types {
            text/plain        ipxe;
            image/png         png;
            image/jpeg        jpg jpeg;
            image/gif         gif;
            image/webp        webp;
        }
        default_type application/octet-stream;
        expires -1;
    }

    location /boot/ {
        alias /srv/ipxe/http/boot/;
        autoindex off;
        sendfile on;
        aio threads;
        directio 512;
        output_buffers 1 128k;
        expires 1d;
    }

    location /configs/ {
        alias /srv/ipxe/http/configs/;
        add_header Content-Type text/plain;
        expires -1;
    }

    location /isos-ipxe/ {
        alias /srv/ipxe/isos/;
        autoindex off;
        sendfile on;
        expires 1d;
    }

    location /wimboot {
        alias /srv/ipxe/http/wimboot;
        add_header Content-Type application/octet-stream;
    }

    location /memdisk {
        alias /srv/ipxe/http/memdisk;
        add_header Content-Type application/octet-stream;
    }

    location /static/ {
        alias /srv/ipxe/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
        proxy_request_buffering off;
    }
}
