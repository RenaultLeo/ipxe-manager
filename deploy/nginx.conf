# /etc/nginx/sites-available/ipxe-manager
# Symlinker dans /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;              # Remplacer par le FQDN ou l'IP du serveur

    # Logs
    access_log  /var/log/nginx/ipxe-manager.access.log;
    error_log   /var/log/nginx/ipxe-manager.error.log;

    # Performances pour gros fichiers (boot.wim, vmlinuz…)
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;

    client_max_body_size 60G;   # Upload ISO volumineux

    # ── Fichiers statiques iPXE servis directement par Nginx ──────────────
    # Ces locations bypassent FastAPI pour les performances maximales

    location /menus/ {
        alias /srv/ipxe/http/menus/;
        add_header Content-Type text/plain;
        expires -1;             # Pas de cache pour les menus dynamiques
    }

    location /boot/ {
        alias /srv/ipxe/http/boot/;
        sendfile on;
        aio threads;
        directio 512;
        output_buffers 1 128k;
        expires 1d;
    }

    location /configs/ {
        alias /srv/ipxe/http/configs/;
        add_header Content-Type text/plain;
        expires -1;
    }

    # wimboot — binaire iPXE pour Windows WinPE boot
    location /wimboot {
        alias /srv/ipxe/http/wimboot;
        add_header Content-Type application/octet-stream;
    }

    # ── Interface web FastAPI ──────────────────────────────────────────────
    location /static/ {
        alias /srv/ipxe/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeout généreux pour les uploads ISO lourds
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
        proxy_request_buffering off;    # Stream l'upload directement à FastAPI
    }
}

